services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: adams_db
    environment:
      POSTGRES_DB: ${DB_NAME:-adamsdb}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adams_network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: adams_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-fire_user}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-fire_pasword}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"  # MinIO API
      - "9001:9001"  # MinIO Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - adams_network

  # Django Application
  web:
    build: .
    container_name: adams_web
    command: gunicorn -c gunicorn_config.py adams.wsgi:application
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - logs_volume:/app/logs
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override database host to use service name
      DB_HOST: db
      DB_PORT: 5432
      # Override MinIO URL to use service name
      MINIO_URL: minio:9000
      # Ensure DEBUG is false in production
      DEBUG_MODE: ${DEBUG_MODE:-false}
      # Enable static file serving in Docker (Django will serve static files)
      SERVE_STATIC: "true"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - adams_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  logs_volume:
    driver: local

networks:
  adams_network:
    driver: bridge
